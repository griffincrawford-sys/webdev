<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intro to JS</title>

    <style>
        .equation {
            display: flex;
            gap: 10px;
        }

        .equation span { font-size: 2rem; }

        #num1 {font-size: 2rem;}


    </style>
</head>
<body>
    <h1>Intro to JavaScript</h1>

    <div class="equation">
        <span id="num1">number</span>
        <span>+</span>
        <span id="num2">number</span>
        <span>=</span>
        <input type="text" id="answer" autocomplete="off"> 
        <button onclick="checkAnswer()">Answer</button>
    </div>

    <p id="result"></p>
    


    <script>
        // const variables are constants/immutable (dont change)
        // let variables are mutable (do change)
        const num1 = document.getElementById("num1");
        const num2 = document.getElementById("num2");
        const userAnswer = document.getElementById("answer");
        const result= document.getElementById("result");
        // console.log(num1.innerText);

        let n1 = Math.floor(Math.random() * 101);
        console.log(n1);
        num1.innerText = n1

         let n2 = Math.floor(Math.random() * 101);
        console.log(n2);
        num2.innerText = n2

        function checkAnswer() {
            // get user's answer
            let user = userAnswer.value;
            let answer = n1 + n2;
            
            if (answer == user) {
                // they got it correct!
                console.log("Correct!");
                userAnswer.style.border = "1px solid hsl(120, 60%, 67%)";
                userAnswer.style.backgroundColor = "hsl(120, 60%, 87%)";
                 result.style.color = "hsl(120, 60%, 87%)";
                result.innerText = "Correct"
            } 
            
            else {
                //they got it wrong :(
                console.log("Wrong!")
                userAnswer.style.border = "1px solid hsl(3, 100%, 69%)";
                userAnswer.style.backgroundColor = "hsl(3, 100%, 89%)";
                result.style.color = "hsl(3, 100%, 69%)";
                result.innerText = "Wrong"
            }
        }

    </script>
</body>
</html>
